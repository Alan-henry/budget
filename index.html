<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BudgetWing — Visualize your budgets with interactive pie charts, Sankey flow diagrams, and mind maps." />
    <meta name="theme-color" content="#0a0e1a" />
    <title>BudgetWing — Budget Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🪶%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <span class="logo-icon">🪶</span>
            <span class="logo-text">BudgetWing</span>
          </div>
          <p class="logo-tagline">Your finances, visualized</p>
        </div>

        <div class="total-card">
          <div class="total-card-header">
            <div class="total-label">Total Budget</div>
            <button class="btn-edit-budget" id="btn-edit-budget" title="Set total budget">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
          </div>

          <!-- Display mode -->
          <div id="budget-display">
            <div class="total-amount" id="total-amount">$0.00</div>
            <div class="total-items" id="total-items">0 categories</div>
            <div class="budget-bar-wrap" id="budget-bar-wrap">
              <div class="budget-bar-track">
                <div class="budget-bar-fill" id="budget-bar-fill"></div>
              </div>
              <div class="budget-bar-labels">
                <span class="budget-bar-spent" id="budget-bar-spent"></span>
                <span class="budget-bar-remain" id="budget-bar-remain"></span>
              </div>
            </div>
          </div>

          <!-- Edit mode -->
          <div id="budget-edit" class="hidden">
            <div class="budget-input-wrap">
              <span class="budget-currency-sym" id="budget-currency-sym">$</span>
              <input type="number" id="budget-input" placeholder="Enter total budget..." min="0" step="1" />
            </div>
            <div class="budget-edit-actions">
              <button class="btn-budget-clear" id="btn-budget-clear" title="Use category sum">Auto</button>
              <button class="btn-budget-save" id="btn-budget-save">Set Budget</button>
            </div>
          </div>
        </div>

        <nav class="view-nav">
          <button class="nav-btn active" id="btn-pie" data-view="pie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a10 10 0 0 1 10 10" />
              <path d="M12 2v10l8.5 5" />
              <circle cx="12" cy="12" r="10" />
            </svg>
            Pie Chart
          </button>
          <button class="nav-btn" id="btn-mindmap" data-view="mindmap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <circle cx="4" cy="6" r="2" />
              <circle cx="20" cy="6" r="2" />
              <circle cx="4" cy="18" r="2" />
              <circle cx="20" cy="18" r="2" />
              <line x1="12" y1="9" x2="4" y2="7" />
              <line x1="12" y1="9" x2="20" y2="7" />
              <line x1="12" y1="15" x2="4" y2="17" />
              <line x1="12" y1="15" x2="20" y2="17" />
            </svg>
            Mind Map
          </button>
          <button class="nav-btn" id="btn-sankey" data-view="sankey">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 5h4" />
              <path d="M3 19h4" />
              <path d="M7 5c5 0 6 3 6 7s1 7 6 7" />
              <path d="M7 19c5 0 6-3 6-7s1-7 6-7" />
              <line x1="17" y1="5" x2="21" y2="5" />
              <line x1="17" y1="12" x2="21" y2="12" />
              <line x1="17" y1="19" x2="21" y2="19" />
            </svg>
            Sankey Flow
          </button>
        </nav>

        <div class="sidebar-actions">
          <button class="btn-add" id="btn-add-budget">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add Category
          </button>
          <button class="btn-import" id="btn-import">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Import JSON
          </button>
        </div>

        <div class="budget-list" id="budget-list"></div>

        <input type="file" id="file-input" accept=".json" style="display:none" />
      </aside>

      <!-- Main Content -->
      <main id="main-content">
        <!-- Header -->
        <header class="main-header">
          <div class="header-left">
            <h1 id="view-title">Pie Chart View</h1>
            <p id="view-subtitle">Visualize your budget allocation at a glance</p>
          </div>
          <div class="header-right">
            <div class="currency-selector">
              <select id="currency-select">
                <option value="$">$ USD</option>
                <option value="£">£ GBP</option>
                <option value="€">€ EUR</option>
                <option value="₹">₹ INR</option>
                <option value="¥">¥ JPY</option>
              </select>
            </div>
          </div>
        </header>

        <!-- Chart Container -->
        <div id="chart-container">
          <div id="pie-view" class="chart-view active">
            <div id="pie-chart-wrapper">
              <svg id="pie-chart"></svg>
            </div>
            <div id="pie-legend"></div>
          </div>
          <div id="mindmap-view" class="chart-view">
            <svg id="mindmap-chart"></svg>
            <div id="mindmap-tooltip" class="tooltip"></div>
          </div>
          <div id="sankey-view" class="chart-view">
            <svg id="sankey-chart"></svg>
            <div id="sankey-tooltip" class="tooltip" style="position:fixed;"></div>
          </div>
          <div id="empty-state" class="hidden">
            <div class="empty-icon">📊</div>
            <h2>No budget data yet</h2>
            <p>Click <strong>Add Category</strong> in the sidebar to get started</p>
          </div>
        </div>
      </main>

      <!-- Budget Editor Panel -->
      <div id="editor-overlay" class="hidden"></div>
      <div id="editor-panel" class="hidden">
        <div class="editor-header">
          <h2 id="editor-title">Add Category</h2>
          <button class="editor-close" id="editor-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <form id="editor-form">
          <input type="hidden" id="edit-id" />
          <div class="form-group">
            <label for="edit-label">Category Name</label>
            <input type="text" id="edit-label" placeholder="e.g. Rent, Food, Transport..." maxlength="40" required />
          </div>
          <div class="form-group">
            <label for="edit-amount">Amount</label>
            <div class="amount-input-wrap">
              <span class="currency-prefix" id="currency-prefix">$</span>
              <input type="number" id="edit-amount" placeholder="0.00" min="0" step="0.01" required />
            </div>
          </div>
          <div class="form-group">
            <label>Color</label>
            <div class="color-swatches" id="color-swatches"></div>
          </div>
          <div class="form-group">
            <label for="edit-note">Note (optional)</label>
            <input type="text" id="edit-note" placeholder="Brief description..." maxlength="80" />
          </div>
          <div class="form-actions">
            <button type="button" class="btn-delete hidden" id="btn-delete">Delete</button>
            <button type="submit" class="btn-save" id="btn-save">Save Category</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
